title: Workshop · GitHub Copilot para Telefónica
description: Workshop hands-on de 2h sobre GitHub Copilot a nivel enterprise — gobernanza, costes, MCP/Skills, caso práctico y plan 90 días.
remote_theme: pages-themes/cayman@v0.2.0
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-relative-links
  - jekyll-default-layout
  - jekyll-titles-from-headings

relative_links:
  enabled: true
  collections: true

titles_from_headings:
  enabled: true
  strip_title: false
  collections: true

show_downloads: true
google_analytics: ""

# Lo que NO publicamos en Pages (mantiene el repo limpio)
exclude:
  - LICENSE
  - CONTRIBUTING.md
  - CODE_OF_CONDUCT.md
  - SECURITY.md
  - CHANGELOG.md
  - .gitignore
  - .github/
  - anexos/scripts/*.ps1
  - "**/*.yml"
  - "**/*.yaml"
  - "**/*.json"
  - "*.lock"
  - Gemfile
  - vendor/

# SEO
author:
  name: Antonio Chapinal Reyes
  twitter: ""
twitter:
  username: ""
  card: summary_large_image
social:
  name: Workshop · GitHub Copilot para Telefónica
  links:
    - https://github.com/chapi-dev/telefonica-copilot-workshop

defaults:
  - scope:
      path: ""
    values:
      layout: default
